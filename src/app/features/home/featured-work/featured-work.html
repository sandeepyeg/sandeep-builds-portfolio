<section class="section featured-work" id="work" data-theme="cobalt">
  <div class="container">
    <app-section-heading eyebrow="01 · Case Study" [heading]="heading" />

    <article class="featured">
      <div class="featured__visual reveal" aria-hidden="true">
        <svg viewBox="0 0 560 200" class="featured__flow" preserveAspectRatio="xMidYMid meet">
          <g fill="none" stroke="currentColor" stroke-width="1.5">
            @for (node of flow; track node; let i = $index) {
              <rect [attr.x]="20 + i * 90" y="80" width="76" height="40" rx="8" opacity="0.95" />
            }
          </g>
          <g
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-dasharray="4 4"
            opacity="0.7"
          >
            @for (node of flow; track node; let i = $index) {
              @if (!$last) {
                <path [attr.d]="'M' + (96 + i * 90) + ' 100 L' + (110 + i * 90) + ' 100'" />
              }
            }
          </g>
          <g font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="currentColor">
            @for (node of flow; track node; let i = $index) {
              <text [attr.x]="58 + i * 90" y="105" text-anchor="middle">{{ node }}</text>
            }
          </g>
        </svg>
        <p class="featured__visual-note">Conceptual illustration only</p>
      </div>

      <div class="featured__content reveal">
        <p class="eyebrow featured__label">{{ project().label }}</p>
        <h3 class="featured__title">{{ project().title }}</h3>
        <p class="featured__summary">{{ project().summary }}</p>

        <div class="featured__capabilities">
          <p class="featured__caps-label">Capabilities</p>
          <ul role="list" class="featured__caps">
            @for (cap of project().capabilities; track cap) {
              <li>{{ cap }}</li>
            }
          </ul>
        </div>

        <div class="featured__stack">
          <p class="featured__caps-label">Technology</p>
          <app-technology-list [technologies]="project().technologies" />
        </div>

        <a class="btn btn--primary featured__cta" [routerLink]="project().route">
          <span>Read Sanitized Case Study</span>
          <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
            <path
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M5 12h14M13 6l6 6-6 6"
            />
          </svg>
        </a>
      </div>
    </article>
  </div>
</section>
