<section class="hero" id="top" data-theme="ink">
  <div class="container hero__inner">
    <div class="hero__content">
      <p class="hero__eyebrow eyebrow">{{ hero.statusLine }}</p>

      <h1 class="hero__name">
        <app-animated-heading [text]="hero.nameLines[0]" [display]="true" />
        <app-animated-heading [text]="hero.nameLines[1]" [display]="true" />
      </h1>

      <p class="hero__headline">{{ hero.headline }}</p>
      <p class="hero__supporting lead">{{ hero.supporting }}</p>

      <div class="hero__actions">
        <a routerLink="/" fragment="work" class="btn btn--primary">
          <span>View Selected Work</span>
        </a>
        <a class="btn btn--ghost" [href]="profile.githubUrl" target="_blank" rel="noopener noreferrer">
          <span>GitHub</span>
          <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
            <path
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M7 17 17 7M9 7h8v8"
            />
          </svg>
        </a>
        <a
          class="btn btn--ghost"
          [href]="profile.linkedinUrl"
          target="_blank"
          rel="noopener noreferrer"
        >
          <span>LinkedIn</span>
          <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
            <path
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M7 17 17 7M9 7h8v8"
            />
          </svg>
        </a>
        @if (hasResume) {
          <a
            class="btn btn--ghost"
            [href]="profile.resumePath"
            download
            aria-label="Download Resume PDF"
          >
            <span>Download Resume</span>
            <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
              <path
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M12 3v13M5 14l7 7 7-7"
              />
            </svg>
          </a>
        }
      </div>

      <p class="hero__availability">
        <span class="hero__pulse" aria-hidden="true"></span>
        {{ hero.availability }}
      </p>

      @if (latestCommit(); as commit) {
        <div class="hero__git-activity">
          <span class="hero__git-dot" aria-hidden="true"></span>
          <span>
            Latest Commit:
            <a [href]="commit.url" target="_blank" rel="noopener noreferrer" class="hero__git-link">
              "{{ commit.message }}"
            </a>
            on <span class="hero__git-repo">{{ commit.repo }}</span>
            <span class="hero__git-time">({{ commit.time }})</span>
          </span>
        </div>
      }
    </div>

    <div class="hero__visual" aria-hidden="true">
      <div class="hero__image-float-wrapper">
        <div class="hero__image-wrapper">
          <img
            src="/images/main_image.png"
            alt="Sandeep Johal — Software Developer"
            class="hero__image"
            loading="eager"
          />
        </div>
      </div>
    </div>
  </div>
</section>
